# =============================================================================
# Documentation Style Guidelines
# =============================================================================
# - Professional, direct tone (no marketing language)
# - Tables for all CLI options and configuration fields
# - Code blocks with language hints (yaml, bash, json, swift)
# - Use admonitions sparingly (only for important notes/warnings)
# - Examples should be copy-pasteable
# - Keep pages focused and concise - one topic per page
# - No deep troubleshooting guides - keep it minimal but useful
# =============================================================================

site_name: shed-desktop
site_description: 'A native macOS menu-bar control surface for the shed toolchain'
site_author: 'shed-desktop Contributors'
site_url: 'https://charliek.github.io/shed-desktop/'

repo_name: charliek/shed-desktop
repo_url: https://github.com/charliek/shed-desktop
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site-build

dev_addr: '127.0.0.1:7072'

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.share
    - header.autohide
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.footer
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/shipping-pallet

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First Run: getting-started/first-run.md
  - Reference:
      - Architecture: reference/architecture.md
      - Configuration: reference/configuration.md
      - Credential approvals: reference/approvals.md
      - IPC: reference/ipc.md
      - shedctl CLI: reference/cli.md
  - Roadmap: roadmap.md
  - Development:
      - Setup: development/setup.md
      - Test automation: development/test-automation.md
      - Design Spec (historical): spec.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/charliek/shed-desktop
