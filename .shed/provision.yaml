# Shed provisioning for shed-desktop's GTK (shed-gtk) Linux test loop on a Mac.
#
# A shed is an Apple VZ Linux microVM (real Ubuntu kernel), so it runs the GTK4
# UI + Xvfb + pytest that can't run on macOS. Mount the repo with
# `shed create <name> --local-dir <repo>`; this file is read from the mount.
#
# shed-gtk is a dashboard (X11/Xvfb only) — unlike roost's terminal it needs no
# cage/seatd/weston or /dev/uinput, so there is only a one-time `install` hook
# (no per-boot `startup`). tools/shed/shed-test.sh snapshots the provisioned box
# so fresh sheds skip this layer.
hooks:
  install: .shed/scripts/install.sh

# First apt + cargo build under VirtioFS can be slow.
timeout: 30m
