name: sanity-check-app

# Manually-triggered verification that the charliek-release-bot App is installed
# on every repo release.yml touches — this repo (the Sparkle appcast push target)
# and charliek/apt-charliek (the .deb publish-dispatch target). Run from the
# Actions UI → "Run workflow" after the RELEASE_BOT_APP_* secrets are set + the
# App is installed on both. A failure to mint, or a 404 on a reach check, means
# the App isn't installed on that repo — fix it BEFORE the first real release
# runs (the release would otherwise fail mid-flight at the dispatch).
#
# The bot identity comes from the action's app-slug output, not `gh api /user`
# (installation tokens 403 there — they don't authenticate as a user).

on:
  workflow_dispatch: {}

permissions: {}   # needs nothing from the workflow token

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # ── 1. self (this repo — the Sparkle appcast push target) ──
      - id: self-token
        uses: actions/create-github-app-token@v3
        with:
          client-id:   ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_KEY }}
      - name: Token sees this repo + bot identity
        env:
          GH_TOKEN: ${{ steps.self-token.outputs.token }}
          BOT_SLUG: ${{ steps.self-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          echo "::group::This repo (must print ${{ github.repository }})"
          gh api "/repos/${GITHUB_REPOSITORY}" --jq '.full_name'
          echo "::endgroup::"
          echo "::group::Installation repository count (informational)"
          gh api /installation/repositories --jq '.total_count'
          echo "::endgroup::"
          echo "::group::Bot identity (should end with [bot])"
          echo "${BOT_SLUG}[bot]"
          echo "::endgroup::"

      # ── 2. charliek/apt-charliek (the .deb publish-dispatch target) ──
      - id: apt-token
        uses: actions/create-github-app-token@v3
        with:
          client-id:   ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_KEY }}
          owner:        charliek
          repositories: apt-charliek
          # Match the floor the real dispatch mints against (repository_dispatch
          # needs contents:write). Do NOT add this to the self block.
          permission-contents: write
      - name: Token can reach charliek/apt-charliek
        env:
          GH_TOKEN: ${{ steps.apt-token.outputs.token }}
        run: |
          set -euo pipefail
          echo "::group::charliek/apt-charliek (must print the same)"
          gh api "/repos/charliek/apt-charliek" --jq '.full_name'
          echo "::endgroup::"
