name: release

# Triggered by a vX.Y.Z tag (created by scripts/release/update-version.sh + the
# release flow). Builds an ad-hoc-signed bundle (Sparkle.framework embedded) and
# attaches a drag-install DMG to the GitHub release.
#
# REMAINING (one-time, see RELEASING.md): a `sparkle-appcast` job that
# sign_update's the DMG with SPARKLE_ED_PRIVATE_KEY, runs
# scripts/update-appcast.py, and the release-bot App pushes docs/appcast.xml to
# main. Needs the App + RELEASE_BOT_* / SPARKLE_ED_PRIVATE_KEY secrets + the main
# ruleset. Developer ID + notarization stay gated on
# SHED_DESKTOP_DEVELOPER_ID_IDENTITY + Apple secrets.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$FILE" ]; then
            echo "tag $TAG does not match VERSION $FILE" >&2
            exit 1
          fi
      - name: Build + bundle
        run: ./scripts/bundle.sh release
      - name: Unit tests
        run: swift test
      - name: Package DMG
        run: ./scripts/make-dmg.sh
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "Ad-hoc signed build (auto-updates via Sparkle). Not notarized yet — see FIRST-LAUNCH.txt in the DMG for the one-time Gatekeeper step." \
            "build/ShedDesktop-${VER}.dmg"
