name: release

# Triggered by a vX.Y.Z tag (created by scripts/release/update-version.sh + the
# release flow). Builds the bundle (Sparkle.framework embedded), packages a
# drag-install DMG, attaches it to the GitHub release, EdDSA-signs it for the
# Sparkle appcast, and the release-bot App pushes docs/appcast.xml to main.
#
# Developer ID signing + notarization activate automatically once all six Apple
# secrets exist (the CAN_NOTARIZE gate): the cert is imported into a throwaway
# keychain, bundle.sh signs with SHED_DESKTOP_DEVELOPER_ID_IDENTITY, and
# notarize.sh submits + staples the DMG. With any secret missing the DMG ships
# ad-hoc-signed (Gatekeeper-bypass note in the DMG). See RELEASING.md for the
# full secret list.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      # Sign + notarize only when the FULL prerequisite set is present. Any
      # missing secret → ad-hoc fallback: a Developer-ID-signed but un-notarized
      # DMG is still Gatekeeper-blocked, so signing without notarizing has no
      # value, and a partial secret set must not break the build or silently
      # drop the first-launch note. The identity is handed to the bundle/DMG
      # steps (below) only when this is true.
      CAN_NOTARIZE: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.SHED_DESKTOP_DEVELOPER_ID_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't persist GITHUB_TOKEN creds: otherwise the appcast bot push
          # authenticates as GITHUB_TOKEN (via the http.extraheader) instead of
          # the App token, and GitHub suppresses the downstream docs.yml that
          # republishes Pages. The repo is public, so the unauthenticated
          # `git fetch origin main` below still works.
          persist-credentials: false
      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$FILE" ]; then
            echo "tag $TAG does not match VERSION $FILE" >&2
            exit 1
          fi

      # Inert until all six Apple secrets exist. When present, imports the
      # Developer ID Application cert into a throwaway keychain so codesign (in
      # bundle.sh) and notarization can use it.
      - name: Import Developer ID certificate
        if: env.CAN_NOTARIZE == 'true'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          kc="$RUNNER_TEMP/shed-desktop-signing.keychain-db"
          kp="$(openssl rand -base64 24)"
          security create-keychain -p "$kp" "$kc"
          security set-keychain-settings -lut 21600 "$kc"
          security unlock-keychain -p "$kp" "$kc"
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$kc" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$kp" "$kc"
          # Prepend our keychain to the user search list, keeping the existing
          # ones; the command substitution must word-split into separate paths.
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$kc" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"

      # The identity reaches bundle.sh / make-dmg.sh only when CAN_NOTARIZE —
      # otherwise empty, so they take the ad-hoc path (and make-dmg keeps the
      # FIRST-LAUNCH note).
      - name: Build + bundle
        env:
          SHED_DESKTOP_DEVELOPER_ID_IDENTITY: ${{ env.CAN_NOTARIZE == 'true' && secrets.SHED_DESKTOP_DEVELOPER_ID_IDENTITY || '' }}
        run: ./scripts/bundle.sh release
      - name: Unit tests
        run: swift test
      - name: Package DMG
        env:
          SHED_DESKTOP_DEVELOPER_ID_IDENTITY: ${{ env.CAN_NOTARIZE == 'true' && secrets.SHED_DESKTOP_DEVELOPER_ID_IDENTITY || '' }}
        run: ./scripts/make-dmg.sh

      # Notarize + staple BEFORE the upload + appcast signing: stapling rewrites
      # the DMG bytes, so the EdDSA sign_update below must run against the
      # stapled file. Gated on CAN_NOTARIZE so it never tries to notarize an
      # ad-hoc DMG (notarize.sh also self-guards on the APPLE_* creds).
      - name: Notarize + staple (skipped without credentials)
        if: env.CAN_NOTARIZE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./scripts/notarize.sh "build/ShedDesktop-${GITHUB_REF_NAME#v}.dmg"

      # What governs Gatekeeper on a downloaded DMG is whether it's *notarized*
      # (a stapled ticket), not whether a signing cert exists — a Developer-ID-
      # signed but un-notarized DMG is still blocked. Gate the release-note
      # guidance on the real artifact state via `stapler validate`.
      - name: Detect DMG notarization status
        id: dmg_notarized
        run: |
          if xcrun stapler validate "build/ShedDesktop-${GITHUB_REF_NAME#v}.dmg" >/dev/null 2>&1; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          NOTARIZED: ${{ steps.dmg_notarized.outputs.value }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if [ "${NOTARIZED}" = "true" ]; then
            NOTES="Notarized Developer ID build (auto-updates via Sparkle). Drag to /Applications and open normally."
          else
            NOTES="Ad-hoc signed build (auto-updates via Sparkle). Not notarized yet — see FIRST-LAUNCH.txt in the DMG for the one-time Gatekeeper step."
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${NOTES}" \
            "build/ShedDesktop-${VER}.dmg"

      # ---- Sparkle appcast: sign the DMG + publish the feed as the release bot ----
      - name: Mint release-bot token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          client-id:    ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key:  ${{ secrets.RELEASE_BOT_APP_KEY }}
          owner:        ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Sign DMG + append appcast entry
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_ED_PRIVATE_KEY}" ]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY is unset — can't sign the appcast entry."
            exit 1
          fi
          VER="${GITHUB_REF_NAME#v}"
          DMG="build/ShedDesktop-${VER}.dmg"
          test -s "${DMG}" || { echo "::error::${DMG} missing — the DMG step must run first."; exit 1; }
          SIGN_UPDATE="$(find .build/artifacts -path '*/bin/sign_update' -type f -not -path '*old_dsa*' | head -1)"
          [ -n "${SIGN_UPDATE}" ] || { echo "::error::sign_update not found under .build/artifacts."; exit 1; }
          W="$(mktemp -d)"; chmod 700 "$W"; trap 'rm -rf "$W"' EXIT
          printf '%s' "${SPARKLE_ED_PRIVATE_KEY}" | base64 --decode > "${W}/key"
          "${SIGN_UPDATE}" --ed-key-file "${W}/key" "${DMG}" > "${W}/sign.txt"
          rm -f "${W}/key"
          cat "${W}/sign.txt"
          # The appcast lives on main (the tag was cut from main, so the
          # untracked build/ + .build/ artifacts survive the checkout).
          git fetch origin main
          git checkout main
          SHED_DESKTOP_VERSION="${VER}" SHED_DESKTOP_TAG="${GITHUB_REF_NAME}" \
            SHED_DESKTOP_SIGN_FILE="${W}/sign.txt" python3 scripts/update-appcast.py
          xmllint --noout docs/appcast.xml

      - name: Push signed appcast to main as release-bot
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          BOT_SLUG: ${{ steps.bot-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          if git diff --quiet docs/appcast.xml; then
            echo "::notice::docs/appcast.xml unchanged for ${GITHUB_REF_NAME} — nothing to push."
            exit 0
          fi
          bot_id="$(gh api "/users/${BOT_SLUG}[bot]" --jq '.id')"
          git config user.name  "${BOT_SLUG}[bot]"
          git config user.email "${bot_id}+${BOT_SLUG}[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          staged="$(git diff --cached --name-only)"
          if [ "${staged}" != "docs/appcast.xml" ]; then
            echo "::error::unexpected staged paths beyond docs/appcast.xml:"; echo "${staged}"; exit 1
          fi
          git commit -m "chore(appcast): publish ${GITHUB_REF_NAME}"
          # Token embedded in the push URL (stays in argv, never written to disk).
          TOKEN_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          for attempt in 1 2 3; do
            if git push "${TOKEN_URL}" HEAD:main; then
              echo "::notice::Appcast pushed — docs.yml redeploys Pages → feed live."
              exit 0
            fi
            echo "::warning::push attempt ${attempt} failed; rebasing onto origin/main"
            git fetch "${TOKEN_URL}" main
            git rebase FETCH_HEAD || { echo "::error::rebase conflict on docs/appcast.xml"; exit 1; }
          done
          echo "::error::push failed after 3 attempts."; exit 1
