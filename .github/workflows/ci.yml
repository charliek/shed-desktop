name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job only checks out + builds + tests — no writes.
permissions:
  contents: read

jobs:
  swift:
    name: build · test · e2e
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift toolchain
        run: swift --version
      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustc --version && cargo --version
      - name: Build (Rust core + Swift)
        # `make build` runs scripts/build-core.sh (staticlib + UniFFI bindings +
        # xcframework) before `swift build` — the .binaryTarget path must exist.
        run: make build
      - name: Rust core — test + clippy
        run: make core-test core-lint
      - name: Swift unit tests
        run: make test
      - name: Bundle
        run: ./scripts/bundle.sh debug
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Hermetic E2E
        # Headless GUI launch via `open`; the screenshot op renders
        # in-process so no screen-recording TCC grant is needed. Slower CI
        # gets a wider wait budget.
        run: SHED_DESKTOP_TEST_TIMEOUT_SCALE=4 uv run --group test pytest tools/shedtest -q
      - name: Hermetic E2E (Rust-core parity)
        # The same suite with reads/lifecycle/create routed through the Rust core.
        # wait_alive asserts identify.core=rust, so a silent Swift fallback fails
        # rather than passing a false-green parity run.
        run: SHED_DESKTOP_RUST_CORE=1 SHED_DESKTOP_TEST_TIMEOUT_SCALE=4 uv run --group test pytest tools/shedtest -q
      - name: Real-launch smoke
        # Non-test launch on a fresh runner (undetermined notification auth) —
        # exercises the real SystemNotificationPresenter path the hermetic suite
        # can't reach. Regression guard for the v0.0.2 SIGTRAP (issue #2).
        run: ./scripts/smoke-real-launch.sh
      - name: Launch/reopen window smoke
        # Real launch path the hermetic suite gates off: a user launch opens the
        # dashboard and reopening the running app reaches it. Guards issue #4.
        run: ./scripts/smoke-launch-window.sh

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Build docs
        run: uv run --group docs mkdocs build

  # Single required check for the `main` ruleset: green only when both jobs
  # pass. Lets the branch rule name one check instead of tracking each matrix
  # leg (and release.yml's ci-gate can poll this one name).
  ci-success:
    name: ci-success
    needs: [swift, docs]
    runs-on: ubuntu-latest
    steps:
      - run: echo "build · test · e2e + docs are green"
