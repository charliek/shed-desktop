name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job only checks out + builds + tests — no writes.
permissions:
  contents: read

jobs:
  swift:
    name: build · test · e2e
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift toolchain
        run: swift --version
      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustc --version && cargo --version
      - name: Build (Rust core + Swift)
        # `make build` runs scripts/build-core.sh (staticlib + UniFFI bindings +
        # xcframework) before `swift build` — the .binaryTarget path must exist.
        run: make build
      - name: Rust core — test + clippy
        run: make core-test core-lint
      - name: Swift unit tests
        run: make test
      - name: Bundle
        run: ./scripts/bundle.sh debug
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Hermetic E2E (Rust core — default)
        # Default-on since M0: with no flag the Rust shed-core backs reads/
        # lifecycle/create. Headless GUI launch via `open`; the screenshot op
        # renders in-process so no screen-recording TCC grant is needed.
        # wait_alive asserts identify.core=rust, and a Rust-adapter construction
        # failure now fails the host loudly (no silent Swift fallback), so a
        # false-green can't slip through. Slower CI gets a wider wait budget.
        run: SHED_DESKTOP_TEST_TIMEOUT_SCALE=4 uv run --group test pytest tools/shedtest -q
      - name: Hermetic E2E (Swift fallback — SHED_DESKTOP_RUST_CORE=0)
        # The rollback escape hatch (kept ≥2 releases): the legacy Swift URLSession
        # path. wait_alive asserts identify.core=swift, so the fallback stays
        # reachable and green.
        run: SHED_DESKTOP_RUST_CORE=0 SHED_DESKTOP_TEST_TIMEOUT_SCALE=4 uv run --group test pytest tools/shedtest -q
      - name: M0 ship-gates (arm64 + cold-launch + golden cross-backend byte-diff)
        # The deferred Phase-1 safety nets for the default flip: arm64-only Mach-Os,
        # a cold-launch budget, and a BYTE-IDENTICAL Rust-vs-Swift IPC payload diff
        # (the cross-backend parity guard). Runs against the debug bundle here for a
        # continuous per-PR guard; `make m0-gates` runs the same checks on a release
        # bundle for the pre-ship size budget. A slower CI runner gets a wider
        # cold-launch budget.
        run: >
          SHED_DESKTOP_TEST_TIMEOUT_SCALE=4
          SHED_DESKTOP_COLD_LAUNCH_BUDGET_S=30
          uv run --group test python tools/shedtest/m0_ship_gates.py
      - name: Real-launch smoke
        # Non-test launch on a fresh runner (undetermined notification auth) —
        # exercises the real SystemNotificationPresenter path the hermetic suite
        # can't reach. Regression guard for the v0.0.2 SIGTRAP (issue #2).
        run: ./scripts/smoke-real-launch.sh
      - name: Launch/reopen window smoke
        # Real launch path the hermetic suite gates off: a user launch opens the
        # dashboard and reopening the running app reaches it. Guards issue #4.
        run: ./scripts/smoke-launch-window.sh

  core-linux:
    name: core-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustc --version && cargo --version
      - name: C toolchain (ring's crypto backend needs build-essential)
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: shed-core — test + clippy (Linux)
        # Scoped to -p shed-core so the macOS-only shed-core-ffi (uniffi) is never
        # dragged in. --all-targets runs the pinned-TLS verifier + redirect/
        # non-https fail-closed tests here; the GTK e2e's plain-HTTP mock never
        # exercises the pin/token paths, so they stay cargo-only on Linux.
        working-directory: core
        run: |
          cargo test -p shed-core --all-targets --locked
          cargo clippy -p shed-core --all-targets --locked -- -D warnings

  gtk-build:
    name: gtk-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustc --version && cargo --version
      - name: GTK + C toolchain (gtk4-rs build scripts need the -dev packages)
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-4-dev libadwaita-1-dev
      - name: shed-gtk — build + clippy + lib tests (Linux)
        # The lib tests (IPC dispatch + config) run without a display; the full
        # window/screenshot e2e under Xvfb lands with the pytest harness (M3).
        working-directory: core
        run: |
          cargo build -p shed-gtk --locked
          cargo clippy -p shed-gtk --all-targets --locked -- -D warnings
          cargo test -p shed-gtk --lib --locked

  e2e-gtk:
    name: e2e-gtk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustc --version && cargo --version
      - name: GTK + Xvfb + mesa
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-4-dev libadwaita-1-dev libgl1-mesa-dri xvfb
      - name: Build shed-gtk
        working-directory: core
        run: cargo build -p shed-gtk --locked
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Hermetic GTK E2E (headless Xvfb)
        # Virtual display via xvfb-run; GDK_BACKEND=x11. GSK_RENDERER=cairo forces
        # the software renderer so the screenshot op doesn't depend on the runner's
        # GL stack (the headless-GL trap) — dashboard.dump is the assertion gate;
        # the screenshot only asserts a non-empty PNG. A wider timeout scale buys
        # headroom on a shared runner (proven headless: Docker+Xvfb+cairo locally).
        env:
          GDK_BACKEND: x11
          GSK_RENDERER: cairo
          SHED_GTK_TEST_TIMEOUT_SCALE: "3"
        run: >
          xvfb-run -a --server-args="-screen 0 1600x1200x24"
          uv run --group test pytest tools/shedgtktest -q
      - name: GTK E2E diagnostics (on failure)
        if: failure()
        run: find "${TMPDIR:-/tmp}" -name shed-gtk.log -path '*shed-gtk-e2e-*' -exec sh -c 'echo "== $1 =="; cat "$1"' _ {} \; || true

  deb:
    name: deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustc --version && cargo --version
      - name: GTK dev libs + nfpm
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential pkg-config libgtk-4-dev libadwaita-1-dev
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update && sudo apt-get install -y nfpm
      - name: Build the .deb
        run: ./linux/scripts/build-deb.sh 0.0.1-ci
      - name: Install-validate in a clean container
        # apt-installs the .deb (resolving its runtime deps) in a fresh ubuntu:24.04
        # and asserts the binary launches under Xvfb + answers identify. Build-in-CI
        # only; apt-repo / release-asset wiring is deferred (see docs/enhancements.md).
        run: ./linux/scripts/validate-deb.sh "$(ls -t out/shed-gtk_*.deb | head -1)"

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Build docs
        run: uv run --group docs mkdocs build

  # Single required check for the `main` ruleset: green only when both jobs
  # pass. Lets the branch rule name one check instead of tracking each matrix
  # leg (and release.yml's ci-gate can poll this one name).
  ci-success:
    name: ci-success
    needs: [swift, core-linux, gtk-build, e2e-gtk, deb, docs]
    runs-on: ubuntu-latest
    steps:
      - run: echo "build · test · e2e + core-linux + gtk-build + e2e-gtk + deb + docs are green"
