# TEMPORARY — one-off export of SPARKLE_ED_PRIVATE_KEY for the monorepo
# migration (charliek/shed Phase 2). The secret is age-encrypted to a
# throwaway local recipient before leaving the runner; the artifact holds
# ciphertext only. This workflow is deleted immediately after the run.
name: temp-export-sparkle-key
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Encrypt the secret to the migration age recipient
        env:
          KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [ -n "${KEY}" ] || { echo "::error::secret is empty"; exit 1; }
          sudo apt-get update -qq && sudo apt-get install -y -qq age
          printf '%s' "${KEY}" | age -r age14lt5x8h66qsx5x4dkuengzfw0qpq93jc2czzft3fhz7j9j34kdpsedansm -o sparkle.age
      - uses: actions/upload-artifact@v4
        with:
          name: sparkle-key-encrypted
          path: sparkle.age
          retention-days: 1
